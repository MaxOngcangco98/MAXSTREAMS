<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX STREAMS</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
}

/* LOGIN */
#login {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    z-index: 1000;
}
input[type=password] {
    padding: 15px;
    border-radius: 20px;
    border: none;
    background: #222;
    color: #fff;
}

/* TOP */
.top {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 500;
}
#search {
    padding: 10px;
    border-radius: 20px;
    border: none;
}

/* CONTENT */
.container { padding-top:80px; padding:20px; }
.scroll { display:flex; gap:15px; overflow-x:auto; }
.card {
    min-width:160px;
    background:#111;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
}
.card img { width:100%; height:230px; object-fit:cover; }
.card div { padding:10px; text-align:center; }

/* DELETE */
.delete-btn {
    position:absolute;
    top:5px;
    right:5px;
    background:red;
    border:none;
    color:#fff;
    border-radius:50%;
    width:22px;
    height:22px;
    cursor:pointer;
}

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    overflow-y:auto;
    z-index:2000;
}
.modal-content {
    background:#111;
    margin:40px auto;
    padding:20px;
    width:90%;
    max-width:900px;
}
iframe { width:100%; height:60vh; border:none; }

/* Season/Episode Menu */
.season-menu { display:flex; overflow-x:auto; gap:5px; margin:10px 0; }
.season-menu button { padding:5px 10px; background:#222; border:none; color:#fff; cursor:pointer; border-radius:5px; flex-shrink:0; }
.ep-menu { display:flex; flex-wrap: wrap; gap:5px; margin:10px 0; }
.ep-menu button { padding:5px 10px; background:#333; border:none; color:#fff; cursor:pointer; border-radius:5px; flex-shrink:0; }
.fullscreen-btn { margin:10px 0; padding:5px 10px; background:#00ff99; border:none; color:#000; cursor:pointer; border-radius:5px; }

/* MAX STREAMS intro */
#intro { 
    text-align:center; 
    font-size:48px; 
    margin-top:20px; 
    color:#00ff99; 
    position:absolute; 
    top:40%; 
    width:100%; 
    z-index:1500; 
}
</style>
</head>

<body>

<div id="login">
<h1>MAX STREAMS</h1>
<input type="password" id="code" placeholder="Enter Code" onkeyup="loginCheck(event)">
<div id="intro" style="display:none;">WELCOME TO MAX STREAMS!</div>
</div>

<div id="app" style="display:none">

<div class="top">
<div onclick="loadHome()">Home</div>

<div>
<input id="search" placeholder="Search..." onkeyup="handleSearch(event)">
<button onclick="search()">Search</button>
</div>

<div>MAX STREAMS</div>
</div>

<div class="container">
<div id="results" class="scroll"></div>

<h2>Resume Watching</h2>
<div id="continueRow" class="scroll"></div>

<h2>For You</h2>
<div id="forYou" class="scroll"></div>

<h2>Trending</h2>
<div id="trending" class="scroll"></div>
</div>

</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<h2 id="title"></h2>
<div id="content"></div>
</div>
</div>

<script>
const CODE="1099";
const API="https://www.omdbapi.com/?apikey=trilogy&s=";

/* LOGIN */
function loginCheck(e){
if(e.key==="Enter"){
const input=document.getElementById("code");
if(input.value===CODE){
document.getElementById("login").style.display="none";
document.getElementById("intro").style.display="block"; // show intro
setTimeout(()=>{
document.getElementById("intro").style.display="none"; // hide intro after 1.5s
document.getElementById("app").style.display="block";
loadHome();
},1500);
}
}
}

/* HOME */
function loadHome(){
forYou.innerHTML="";
trending.innerHTML="";
results.innerHTML="";
loadContinue();

makeRow("Avengers","forYou");
makeRow("Batman","forYou");
makeRow("Spiderman","trending");
makeRow("Iron Man","trending");
}

/* ROW */
function makeRow(q,id){
fetch(API+q).then(r=>r.json()).then(d=>{
if(!d.Search) return;
d.Search.forEach(m=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${m.Poster}"><div>${m.Title}</div>`;
c.onclick=()=>open(m.Title,m.imdbID,m.Poster);
document.getElementById(id).appendChild(c);
});
});
}

/* SAVE */
function saveContinue(title,id,poster,season=null,episode=null){
let data=JSON.parse(localStorage.getItem("continue")||"[]");
data=data.filter(x=>x.id!==id);
data.unshift({title,id,poster,season,episode});
localStorage.setItem("continue",JSON.stringify(data.slice(0,10)));
}

/* DELETE */
function deleteContinue(id){
let data=JSON.parse(localStorage.getItem("continue")||"[]");
data=data.filter(x=>x.id!==id);
localStorage.setItem("continue",JSON.stringify(data));
loadContinue();
}

/* LOAD */
function loadContinue(){
let data=JSON.parse(localStorage.getItem("continue")||"[]");
continueRow.innerHTML="";
data.forEach(d=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`
<button class="delete-btn" onclick="event.stopPropagation(); deleteContinue('${d.id}')">×</button>
<img src="${d.poster}">
<div>${d.title}</div>
<div style="font-size:12px;color:#00ff99;">
${d.season ? "S"+d.season+" E"+d.episode : ""}
</div>
`;
c.onclick=()=>open(d.title,d.id,d.poster,d.season||1,d.episode||1);
continueRow.appendChild(c);
});
}

/* SEARCH */
function handleSearch(e){ if(e.key==="Enter") search(); }

function search(){
let q=document.getElementById("search").value;
if(q.length<2) return;
fetch(API+q).then(r=>r.json()).then(d=>{
results.innerHTML="";
if(!d.Search) return;
d.Search.forEach(m=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${m.Poster}"><div>${m.Title}</div>`;
c.onclick=()=>open(m.Title,m.imdbID,m.Poster);
results.appendChild(c);
});
});
}

/* OPEN */
function open(title,id,poster,season=1,episode=1){
document.getElementById("modal").style.display="block";
document.getElementById("title").innerText=title;

content.innerHTML=`
<button onclick="closeModal()">Back</button>
<div id="seasonMenu" class="season-menu"></div>
<div id="epMenu" class="ep-menu"></div>
<button class="fullscreen-btn" onclick="goFullscreen()">Fullscreen</button>
<iframe id="player"></iframe>
`;

let player=document.getElementById("player");
let seasonMenu=document.getElementById("seasonMenu");
let epMenu=document.getElementById("epMenu");

/* DETECT TYPE */
fetch(`https://www.omdbapi.com/?apikey=trilogy&i=${id}`)
.then(r=>r.json())
.then(data=>{

if(data.Type==="movie"){
    player.src=`https://vidsrc.me/embed/movie?imdb=${id}`;
    saveContinue(title,id,poster,null,null);
    seasonMenu.style.display="none";
    epMenu.style.display="none";
}else{
    const danceMomsEpisodes = {1:13,2:28,3:43,4:32,5:36,6:33,7:29,8:18};
    let totalSeasons = Object.keys(danceMomsEpisodes).length;

    seasonMenu.innerHTML="";
    for(let s=1;s<=totalSeasons;s++){
        let btn=document.createElement("button");
        btn.innerText="S"+s;
        btn.onclick=()=>{ season=s; loadEpisodes(s); };
        seasonMenu.appendChild(btn);
    }

    function loadEpisodes(s){
        epMenu.innerHTML="";
        let eps = danceMomsEpisodes[s] || 10;
        for(let e=1;e<=eps;e++){
            let btn=document.createElement("button");
            btn.innerText="E"+e;
            btn.onclick=()=>{
                episode=e;
                player.src=`https://vidsrc.me/embed/tv?imdb=${id}&season=${season}&episode=${episode}`;
                saveContinue(title,id,poster,season,episode);
            };
            epMenu.appendChild(btn);
        }
        if(!episode) episode=1;
        player.src=`https://vidsrc.me/embed/tv?imdb=${id}&season=${season}&episode=${episode}`;
    }

    loadEpisodes(season);
}
});

/* FULLSCREEN */
window.goFullscreen=function(){
let player=document.getElementById("player");
if(player.requestFullscreen) player.requestFullscreen();
else if(player.webkitRequestFullscreen) player.webkitRequestFullscreen();
else if(player.msRequestFullscreen) player.msRequestFullscreen();
}
}

/* CLOSE */
function closeModal(){
let p=document.getElementById("player");
if(p) p.src="";
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
